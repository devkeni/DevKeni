<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="100 72 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Most used languages</title>
  <desc id="desc">Language distribution across repositories contributed to, shown as a doughnut chart with legend.</desc>

<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="100 72 1000 260" role="img" aria-labelledby="title desc">
  <title id="title">Daily Inspiration</title>
  <desc id="desc">The purpose of computing is insight, not numbers. Richard Hamming.</desc>
  <defs>
    <linearGradient id="surface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f121a" />
      <stop offset="100%" stop-color="#12161f" />
    </linearGradient>
    <radialGradient id="ambient" cx="86%" cy="10%" r="56%">
      <stop offset="0%" stop-color="#4d7fc2" stop-opacity="0.12" />
      <stop offset="55%" stop-color="#4d7fc2" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#4d7fc2" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g>
    <rect x="100" y="72" width="1000" height="260" rx="26" fill="url(#surface)" stroke="#5b89be" stroke-opacity="0.96" stroke-width="4" />
    <rect x="100" y="72" width="1000" height="260" rx="26" fill="url(#ambient)" />
    <rect x="104" y="76" width="992" height="252" rx="22" fill="none" stroke="#b1cff0" stroke-opacity="0.18" stroke-width="1.75" />

    <text x="150" y="130" fill="#a9bfd8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.4">DAILY INSPIRATION</text>
    <text x="150" y="212" fill="#4d7fc2" font-family="Georgia, Times New Roman, serif" font-size="76" font-weight="700">“</text>

    <text x="205" y="184" fill="#f1f3f7" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-style="italic">
      <tspan x="205" dy="0">The purpose of computing is insight,</tspan>
      <tspan x="205" dy="42">not numbers.</tspan>
    </text>

    <line x1="150" y1="274" x2="330" y2="274" stroke="#355d8a" stroke-width="3" stroke-linecap="round" />
    <text x="350" y="281" fill="#8d92a2" font-family="Segoe UI, Arial, sans-serif" font-size="24">Richard Hamming</text>
  </g>
</svg>
